files:
  input: pairs_usdt_spot.csv
tradingview:
  chartUrl: https://www.tradingview.com/chart/ZgERyOFj/?symbol=BINANCE%3ASUSHIUSDTPERP
  interval: 1s  # examples: 1s | 30s | 1m | 15m | 1h | 1D | 1M
alert:
  condition:
    primaryLeft: alpy_vix
  actions:
    notifyOnApp: false
    showPopup: false
    sendEmail: false
    webhook:
      enabled: true
      url: "https://alpyr-bot.duckdns.org/webhook"
  message: >
    {{ticker}},{{strategy.order.action}},{{strategy.order.alert_message}},{{close}},{{strategy.position_size}},{{time}},
