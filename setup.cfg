[flake8]
ignore = W291,W293,W391,E501,E203,W503,E722,W605,E124,E231,E1126
exclude = docs/*,_utils/colorer.py,webapp/ex.py,contract/scripts/project.py,contract/scripts/eBlocBroker.py
max-line-length = 120

[tool:isort]
force_grid_wrap = 0
include_trailing_comma = True
known_standard_library = tkinter
known_first_party = brownie
known_third_party = _mongodb,actions,apscheduler,binance,binance_lib,binance_track,broker,bs4,ccxt,dateutil,discord,dotenv,filelock,flask,forex_python,gevent,matplotlib,psutil,pymongo,quart,requests,selenium,setuptools,tools,trade,user_setup,utils,websocket,yfinance
line_length = 120
multi_line_output = 3
use_parentheses = True

[mypy]
follow_imports = silent
ignore_missing_imports = True

[mypy-web3]
follow_imports = silent

[ipdb]
context=19

[pydocstyle]
ignore = D100,D101,D102,D105,D107,D203,D213,D103