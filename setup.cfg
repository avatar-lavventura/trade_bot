[flake8]
exclude = docs/*,_utils/colorer.py,webapp/ex.py,contract/scripts/project.py,contract/scripts/eBlocBroker.py
max-line-length = 120
ignore = W291,W293,W391,E501,E203,W503,E722,W605,E124,E231,E1126

[tool:isort]
force_grid_wrap = 0
include_trailing_comma = True
known_standard_library = tkinter
known_first_party = brownie
known_third_party = _mongodb,actions,apscheduler,base58,binance,binance_lib,binance_track,bot_helper_async,broker,bs4,ccxt,colorama,dateutil,discord,dotenv,flask,forex_python,gevent,matplotlib,pygments,pymongo,pytz,quart,requests,selenium,setuptools,termcolor,tools,trade,user_setup,yfinance
line_length = 120
multi_line_output = 3
use_parentheses = True

[mypy]
follow_imports = silent
ignore_missing_imports = True

[mypy-web3]
follow_imports = silent

[ipdb]
context=19

[pydocstyle]
ignore = D100, D203